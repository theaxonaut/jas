<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Sheikh Lab</title>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --color-base:      #F5E9E2;
      --color-primary:   #C97C5D;
      --color-secondary: #6F9E8F;
      --color-accent:    #8C6A9E;
      --color-text:      #2B2B2B;
      --color-bg:        #FFFDF9;
      --color-shadow:    #A9654C;
    }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--color-base);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .font-serif-custom { font-family: 'Playfair Display', serif; }
    .card-offset {
      border-radius: 12px;
      border: 2px solid var(--color-text);
      background-color: var(--color-bg);
      box-shadow: 6px 6px 0px 0px var(--color-shadow);
    }
    .btn-offset {
      border-radius: 12px;
      border: 2px solid var(--color-text);
      background-color: var(--color-primary);
      color: #FFFFFF;
      font-weight: 600;
      box-shadow: 4px 4px 0px 0px var(--color-shadow);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
    }
    .btn-offset:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px var(--color-shadow);
    }
    .btn-secondary {
      border-radius: 12px;
      border: 2px solid var(--color-text);
      background-color: var(--color-bg);
      color: var(--color-text);
      font-weight: 600;
      box-shadow: 4px 4px 0px 0px var(--color-secondary);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
    }
    .btn-secondary:hover {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px 0px var(--color-secondary);
    }
  </style>
</head>
<body>

  <div class="card-offset p-10 max-w-lg w-full">

    <!-- Icon -->
    <div class="w-20 h-20 rounded-2xl border-2 flex items-center justify-center text-4xl text-white mx-auto mb-6"
         style="background-color: var(--color-primary); border-color: var(--color-text); box-shadow: 4px 4px 0px 0px var(--color-shadow);">
      <i class="fa-solid fa-flask"></i>
    </div>

    <!-- 404 -->
    <div class="text-8xl font-extrabold mb-2" style="color: var(--color-primary);">404</div>
    <h1 class="font-serif-custom text-2xl font-bold mb-3" style="color: var(--color-text);">
      Page Not Found
    </h1>
    <p class="text-sm mb-8" style="color: color-mix(in srgb, var(--color-text) 70%, transparent);">
      The page you're looking for doesn't exist or has been moved. It may be a profile page that hasn't been created yet.
    </p>

    <!-- Actions -->
    <div class="flex flex-wrap gap-4 justify-center">
      <a href="../index.html" class="btn-offset">
        <i class="fa-solid fa-house"></i> Back to Home
      </a>
      <a href="../people.html" class="btn-secondary">
        <i class="fa-solid fa-users"></i> View People
      </a>
    </div>

    <!-- Lab brand -->
    <div class="mt-10 pt-6 border-t-2" style="border-color: var(--color-base);">
      <div class="flex items-center justify-center gap-2">
        <div class="w-7 h-7 rounded-lg flex items-center justify-center border-2"
             style="background-color: var(--color-primary); border-color: var(--color-text);">
          <i class="fa-solid fa-microscope text-white text-xs"></i>
        </div>
        <span class="font-bold text-sm" style="color: var(--color-text);">Sheikh Lab · Jamia Hamdard</span>
      </div>
    </div>

  </div>

</body>
</html>
